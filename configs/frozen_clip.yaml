seed: 42
paths:
  data_root: data/extracted
  exp_root: experiments
exp_name: attempt11_frozen_clip_linear
model:
  name: vit_large_patch14_clip_224.openai
  pretrained: true
  frozen: true
  head: linear
  drop_rate: 0.1
  streams: [rgb]
data:
  img_size: 224
  batch_size: 48
  num_workers: 14
  rrc_scale: [0.7, 1.0]
  hflip: false
  color_jitter: 0.1
  mean: [0.48145466, 0.4578275, 0.40821073]   # CLIP (OpenAI) normalization
  std: [0.26862954, 0.26130258, 0.27577711]
  recapture:
    prob: 0.7
    downscale: [0.5, 1.0]
    blur: [0.0, 1.2]
    moire_p: 0.3
    gamma: [0.8, 1.2]
    bright: [0.85, 1.15]
    wb: 0.06
    noise_std: [0, 8]
    jpeg_q: [40, 92]
val:
  scheme: stratified
  n_folds: 5
  fold: 0
  holdout_types: []
train:
  epochs: 10
  lr: 0.001
  weight_decay: 0.01
  warmup_epochs: 1
  amp: true
  pos_weight: null
  grad_clip: 1.0
  early_stop_patience: 4
  log_every: 200
predict:
  fill_value: 0.5
  tta_hflip: false
device: cuda
gpu: 6
