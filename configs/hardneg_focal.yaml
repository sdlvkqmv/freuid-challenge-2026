seed: 42
paths:
  data_root: data/extracted
  exp_root: experiments
exp_name: attempt13_hardneg_focal
model:
  name: tf_efficientnet_b3
  pretrained: true
  drop_rate: 0.2
  drop_path_rate: 0.1
  streams: [rgb, srm]
data:
  img_size: 384
  batch_size: 24
  num_workers: 14
  rrc_scale: [0.7, 1.0]
  hflip: false
  color_jitter: 0.1
  recapture:
    prob: 0.7
    downscale: [0.5, 1.0]
    blur: [0.0, 1.2]
    moire_p: 0.3
    gamma: [0.8, 1.2]
    bright: [0.85, 1.15]
    wb: 0.06
    noise_std: [0, 8]
    jpeg_q: [40, 92]
val:
  scheme: stratified
  n_folds: 5
  fold: 0
  holdout_types: []
train:
  epochs: 8
  lr: 0.0003
  weight_decay: 0.05
  warmup_epochs: 1
  amp: true
  pos_weight: null
  grad_clip: 1.0
  early_stop_patience: 4
  log_every: 200
  loss:
    type: focal           # hard-example mining via (1-p_t)^gamma
    gamma_pos: 2.0        # focus hard frauds (low-scoring positives)
    gamma_neg: 3.0        # focus hard bona-fide harder (they set the 1%BPCER threshold)
    alpha: null           # derive pos balance from pos_weight
    ohem_frac: 1.0
predict:
  fill_value: 0.5
  tta_hflip: false
device: cuda
gpu: 6
