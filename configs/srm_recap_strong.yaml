# Attempt 07 — push the SRM×recapture winner (finding #1) harder.
# Base = attempt06 (effb3 srm+recapture, LB 0.15185). Changes: longer training,
# higher recapture prob, wider artifact ranges. Resolution/bs set per-variant via --set.

seed: 42

paths:
  data_root: data/extracted
  exp_root: experiments

exp_name: srm_recap_strong

model:
  name: tf_efficientnet_b3
  pretrained: true
  drop_rate: 0.2
  drop_path_rate: 0.1
  streams: [rgb, srm]               # forensic noise stream is required for recapture synergy

data:
  img_size: 384
  batch_size: 24
  num_workers: 8
  rrc_scale: [0.7, 1.0]
  hflip: false
  color_jitter: 0.1
  # stronger/wider print-and-capture simulation than attempt06 (prob 0.7, narrower ranges)
  recapture:
    prob: 0.85
    downscale: [0.4, 1.0]
    blur: [0.0, 1.8]
    moire_p: 0.4
    moire_amp: 14.0
    gamma: [0.75, 1.3]
    bright: [0.8, 1.2]
    wb: 0.08
    noise_std: [0.0, 12.0]
    jpeg_q: [35, 92]

val:
  scheme: stratified
  n_folds: 5
  fold: 0
  holdout_types: []

train:
  epochs: 12
  lr: 3.0e-4
  weight_decay: 0.05
  warmup_epochs: 1
  amp: true
  pos_weight: null
  grad_clip: 1.0
  early_stop_patience: 4
  log_every: 100

predict:
  fill_value: 0.5
  tta_hflip: false

device: cuda
gpu: 0
